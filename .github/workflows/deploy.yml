name: Deploy to Production

concurrency:
  group: deploy-main
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      PM2_HOME: /home/s0iru/.pm2
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start or restart PM2
        run: |
          export PATH="$(ls -d $HOME/.nvm/versions/node/v*/bin | tail -1):$PATH"
          if pm2 describe vrcsocial >/dev/null 2>&1; then
            pm2 restart vrcsocial --update-env
          else
            pm2 start ecosystem.config.cjs
          fi

      - name: Verify deployment
        run: |
          sleep 3
          code=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3001)
          if [ "$code" != "200" ]; then
            echo "Expected 200, got $code"
            exit 1
          fi
